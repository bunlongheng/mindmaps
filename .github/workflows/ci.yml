name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install -g npm@11 # Node-20-compatible npm that fixes npm/cli#4828 (npm ci skipping optional rollup binary)
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b
      - run: npm run typecheck:api
      - run: npm test
      - run: npm audit --audit-level=critical
