name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
        continue-on-error: true # existing lint debt; tracked for cleanup, not yet a hard gate
      - run: npx tsc -b
      - run: npm run typecheck:api
      - run: npm test
      - run: npm audit --audit-level=critical
