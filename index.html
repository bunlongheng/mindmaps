<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Mindmaps</title>
    <meta name="description" content="Visual mind map and diagram tool. Mind map, tree, fishbone layouts with Supabase persistence." />
    <meta name="author" content="bunlongheng" />
    <meta name="keywords" content="mindmaps, diagram, mind map, fishbone, tree, visual thinking" />

    <!-- ── Favicon stack ──────────────────────────────── -->
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />

    <!-- ── Apple / iOS ────────────────────────────────── -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mindmaps" />

    <!-- ── PWA / Android ─────────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Windows tile ──────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-TileImage" content="/icons/android-chrome-192x192.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ── Open Graph ────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mindmaps" />
    <meta property="og:description" content="Visual mind map and diagram tool. Mind map, tree, fishbone layouts." />
    <meta property="og:image" content="/icons/android-chrome-512x512.png" />
    <meta property="og:site_name" content="Mindmaps" />

    <!-- ── Twitter card ──────────────────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Mindmaps" />
    <meta name="twitter:description" content="Visual mind map and diagram tool." />
    <meta name="twitter:image" content="/icons/android-chrome-512x512.png" />

    <!-- ── Fonts ─────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body style="touch-action: manipulation;">
    <div id="root"></div>
    <!-- Block Safari native pinch/double-tap zoom — we handle zoom in canvas ourselves -->
    <script>
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); }, { passive: false });
      document.addEventListener('gestureend', function(e) { e.preventDefault(); }, { passive: false });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
